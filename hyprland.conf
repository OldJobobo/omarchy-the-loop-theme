# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

$activeBorderColor = rgb(F4CC5D) rgb(FFD700) 45deg
$inactiveBorderColor = rgba(48465a88)

general {
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    border_size = 3
    gaps_in = 5
    gaps_out = 10
    resize_on_border = true
}

decoration {
    rounding = 8
    
    shadow {
        enabled = true
        range = 25
        render_power = 3
        color = rgba(244, 204, 93, 0.4)
        color_inactive = rgba(0, 0, 0, 0.35)
    }
    
    blur {
        enabled = true
        size = 6
        passes = 3
    }
}

group {
    col.border_active = $activeBorderColor
}

# ensure Walker can receive input when transparent
layerrule = ignorezero, walker

windowrulev2 = rounding 8, class:^(walker)$
windowrulev2 = bordercolor rgb(F4CC5D) rgb(FFD700), class:^(walker)$
